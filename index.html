<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Together Health - Firebase Realtime Version</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* [디자인 보존] 원본 CSS 유지 */
        :root {
            --bg-dark: #0D1614;     --point-deep: #1F3831;
            --point-mid: #325C50;    --point-light: #B7E4D0;
            --text-main: #EAEFEF;
            --color-so: #B7E4D0;    --color-kim: #FFD700;
        }
        body { background-color: #222; margin: 0; display: flex; justify-content: center; font-family: 'Pretendard', sans-serif; color: var(--text-main); }
        .phone-container { 
            width: 100vw;   /* 화면 너비 전체 */
            height: 100vh;  /* 화면 높이 전체 */
            border: none;   /* 테두리 제거 */
            border-radius: 0; /* 둥근 모서리 제거 */
            margin-top: 0; 
        }
        .header { background-color: var(--point-deep); padding: 15px; color: var(--text-main); text-align: center; font-weight: bold; border-bottom: 1px solid var(--point-mid); font-size: 1.1rem; z-index: 10; }

        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .login-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(-45deg, #0D1614, #1F3831, #080C0B, #162421); background-size: 400% 400%; animation: gradientMove 10s ease infinite; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .login-box { width: 90%; padding: 40px 20px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; }
        .login-input { width: 80%; padding: 15px; margin-bottom: 15px; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--point-mid); color: white; border-radius: 12px; text-align: center; font-size: 1.2rem; outline: none; }

        .modal-overlay { display: none; position: absolute; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; z-index: 3000; transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); justify-content: center; }
        .modal-overlay.show { display: flex; top: 20px; }
        .streak-modal { background: rgba(31, 56, 49, 0.9); backdrop-filter: blur(10px); width: 100%; padding: 15px; border-radius: 18px; border: 1px solid var(--point-light); display: flex; align-items: center; gap: 12px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .streak-fire { font-size: 2rem; }
        .streak-text { flex: 1; font-size: 0.85rem; color: var(--text-main); text-align: left; }

        .page { display: none; flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; scrollbar-width: none; }
        .page.active { display: flex; flex-direction: column; }
        .section-title { color: var(--point-light); font-size: 0.9rem; font-weight: bold; border-left: 3px solid var(--point-light); padding-left: 8px; margin: 20px 0 12px 0; }
        .card { background: var(--point-deep); padding: 15px; border-radius: 8px; margin-bottom: 20px; }

        #homePage textarea, #homePage .submit-btn, #homePage .feed-item { border-radius: 0px !important; }
        textarea { width: 100%; height: 80px; background: #080C0B; border: 1px solid var(--point-mid); color: white; padding: 12px; box-sizing: border-box; resize: none; margin-bottom: 12px; font-family: inherit; }
        .submit-btn { width: 100%; padding: 15px; background-color: var(--point-light); border: none; font-weight: bold; cursor: pointer; color: var(--bg-dark); }
        .feed-item { background: #121E1B; padding: 15px; margin-bottom: 15px; border: 1px solid var(--point-deep); text-align: left; }
        .feed-header { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--point-mid); margin-bottom: 10px; }
        .feed-img { width: 100%; max-height: 250px; object-fit: cover; margin-bottom: 10px; border: 1px solid #1F3831; }

        .personal-card { background: #1F3831; padding: 15px; border-radius: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .img-input { background: #0D1614; border: 1px solid #2A443D; color: var(--text-main); padding: 12px; font-size: 0.85rem; border-radius: 4px; outline: none; box-sizing: border-box; width: 100%; }
        .add-btn-green { grid-column: span 2; background: #2A443D; color: var(--text-main); border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; }
        .history-container { background: #1F3831; border-radius: 12px; overflow: hidden; }
        .history-thead, .history-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 0.5fr; padding: 12px 5px; font-size: 0.75rem; text-align: center; }
        .history-row { border-top: 1px solid #162421; font-size: 0.85rem; align-items: center; }
        .cheer-floating { position: absolute; bottom: 90px; right: 15px; background: var(--point-light); color: var(--bg-dark); padding: 10px 15px; border-radius: 20px 20px 0 20px; font-size: 0.75rem; font-weight: bold; z-index: 99; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .chart-container { height: 100px; background: #080C0B; border-radius: 4px; padding: 10px; position: relative; }
        svg { width: 100%; height: 100%; overflow: visible; }
        polyline { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
        .progress-container { width: 100%; height: 12px; background: #080C0B; border-radius: 6px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--point-mid), var(--point-light)); width: 0%; transition: width 1s ease; }

        .nav { background-color: var(--point-deep); display: flex; justify-content: space-around; padding: 15px 0; position: absolute; bottom: 0; width: 100%; border-top: 1px solid var(--point-mid); z-index: 10; }
        .nav-item { cursor: pointer; color: white; opacity: 0.4; text-align: center; font-size: 0.7rem; }
        .nav-item.active { opacity: 1; color: var(--point-light); }
    </style>
</head>
<body>

<div class="phone-container">
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2 style="color: var(--point-light); margin-bottom: 5px;">Together Health</h2>
            <p style="color: white; opacity: 0.5; font-size: 0.8rem; margin-bottom: 30px;">Partner Health Connect</p>
            <input type="password" id="pwInput" class="login-input" placeholder="Password">
            <button class="submit-btn" style="border-radius: 12px; width: 80%; margin-top: 10px;" onclick="checkLogin()">Enter</button>
            <p id="loginMsg" style="color: #ff6b6b; font-size: 0.8rem; margin-top: 15px;"></p>
        </div>
    </div>

    <div id="streakOverlay" class="modal-overlay">
        <div class="streak-modal">
            <span class="streak-fire">🔥</span>
            <div id="streakModalText" class="streak-text"></div>
            <span class="modal-close" onclick="closeStreakModal()" style="cursor:pointer; font-weight:bold;">×</span>
        </div>
    </div>

    <div class="header" id="mainTitle">Together Health</div>

    <div id="homePage" class="page active">
        <textarea id="postInput" placeholder="오늘의 식단이나 운동을 기록하세요..."></textarea>
        <button class="submit-btn" onclick="handlePostSubmit()">공유하기</button>
        <label for="imgFile" id="fileLabel" style="display:block; text-align:center; color:var(--point-light); font-size:0.8rem; cursor:pointer; margin: 15px 0; text-decoration:underline;">📷 사진 첨부하기 (클릭)</label>
        <input type="file" id="imgFile" style="display:none" onchange="handleFileChange()" accept="image/*">
        <div id="feedList" style="margin-top:10px;"></div>
    </div>

    <div id="reportPage" class="page">
        <div class="section-title">🎯 이번 주 목표</div>
        <div class="card">
            <input type="text" id="goalInput" placeholder="새 목표 입력" class="img-input">
            <button id="goalSubmitBtn" class="submit-btn" style="margin-top:10px; padding:10px; border-radius:4px;" onclick="saveGoal()">목표 설정</button>
            <p id="targetGoal" style="color:var(--point-light); font-size:0.85rem; text-align:center; margin-top:10px; font-weight:bold;"></p>
        </div>
        <div class="section-title">📊 활동 에너지 점수 (Week)</div>
        <div class="card">
            <div class="chart-container">
                <svg viewBox="0 0 300 100" preserveAspectRatio="none">
                    <polyline id="lineSo" points="" stroke="var(--color-so)"></polyline>
                    <polyline id="lineKim" points="" stroke="var(--color-kim)"></polyline>
                </svg>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                <div style="text-align:center;"><span id="soTotal" style="color:var(--point-light); font-weight:bold;">0회</span><br><small>이진</small></div>
                <div style="text-align:center;"><span id="kimTotal" style="color:var(--point-light); font-weight:bold;">0회</span><br><small>진영</small></div>
            </div>
        </div>
        <div class="section-title">🎊 목표 달성 시뮬레이션</div>
        <div class="card">
            <div style="display:flex; justify-content:space-between; font-size:0.8rem;"><span>성공률</span><span id="pctValue">0%</span></div>
            <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        </div>
    </div>

    <div id="personalPage" class="page">
        <div class="section-title">✍️ 오늘 기록 입력</div>
        <div class="personal-card">
            <input type="text" id="inDate" class="img-input" readonly>
            <input type="text" id="inWeight" class="img-input" placeholder="체중(kg)">
            <input type="text" id="inEx" class="img-input" placeholder="운동(🏃)">
            <input type="text" id="inFood" class="img-input" placeholder="식단(🥗)">
            <button class="add-btn-green" onclick="addPersonalLog()">기록 추가</button>
        </div>
        <div class="history-container">
            <div class="history-thead"><span>날짜</span><span>운동</span><span>식단</span><span>체중</span><span>×</span></div>
            <div id="personalLogList"></div>
        </div>
        <div id="cheerFloating" class="cheer-floating"></div>
    </div>

    <div class="nav">
        <div class="nav-item" onclick="switchTab('report', this)">📊<br>리포트</div>
        <div class="nav-item active" onclick="switchTab('home', this)">🏠<br>홈</div>
        <div class="nav-item" onclick="switchTab('personal', this)">👤<br>개인</div>
    </div>
</div>

<script>
    // [Firebase 설정]
    const firebaseConfig = {
        apiKey: "AIzaSyDLT42wAbGadooJtENlS2rArMemdaBYBNM",
        authDomain: "together-health.firebaseapp.com",
        projectId: "together-health",
        storageBucket: "together-health.firebasestorage.app",
        messagingSenderId: "77888571104",
        appId: "1:77888571104:web:7f254f1ce59c94bdedf285",
        databaseURL: "https://together-health-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    const passwords = { "소이진": "1234", "김진영": "0000" };
    let posts = [];
    let logs = [];
    let selectedImg = null;
    let lastClickTime = 0;

    window.onload = () => { setAutoDate(); };

    function checkLogin() {
        const inputPw = document.getElementById('pwInput').value;
        for (const [user, pw] of Object.entries(passwords)) {
            if (pw === inputPw) {
                currentUser = user;
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainTitle').innerText = `Together Health (${currentUser})`;
                initRealtimeSync();
                setDailyCheer();
                return;
            }
        }
        document.getElementById('loginMsg').innerText = "비밀번호가 올바르지 않습니다.";
    }

    // [Firebase 실시간 동기화 - Key 포함 수정]
    function initRealtimeSync() {
        db.ref('posts').on('value', snap => {
            const data = snap.val() || {};
            // Object.keys를 사용하여 Firebase의 고유 ID(key)를 데이터에 포함시킵니다.
            posts = Object.keys(data).map(key => ({
                ...data[key],
                key: key 
            })).sort((a, b) => b.id - a.id);
            renderFeed();
        });

        db.ref('logs').on('value', snap => {
            const data = snap.val() || {};
            logs = Object.keys(data).map(key => ({
                ...data[key],
                key: key
            }));
            refreshPersonalPage();
            if(document.getElementById('reportPage').classList.contains('active')) renderChart();
            showStreakToast();
        });

        db.ref('goals').on('value', snap => {
            updateGoalUI(snap.val() || {});
        });
    }

    function setDailyCheer() {
        const msgs = ["오늘도 고생했어! 💛", "물 한잔 마셨어? 💧", "화이팅, 할 수 있어! 🔥", "기록하는 당신이 아름다워요✨", "천천히 가도 괜찮아🐢"];
        const now = new Date();
        const dateNum = (now.getFullYear() * 10000) + ((now.getMonth() + 1) * 100) + now.getDate();
        const dailyIndex = dateNum % msgs.length;
        const cheerEl = document.getElementById('cheerFloating');
        if(cheerEl) cheerEl.innerText = msgs[dailyIndex];
    }

    function updateGoalUI(allGoals) {
        const userGoalData = allGoals[currentUser] || null;
        let finalGoal = null;
        if (userGoalData) {
            const now = new Date();
            const saveDay = new Date(userGoalData.timestamp);
            const monday = new Date(now);
            const day = now.getDay();
            const diff = now.getDate() - day + (day === 0 ? -6 : 1);
            monday.setDate(diff);
            monday.setHours(0, 0, 0, 0);
            if (saveDay < monday) {
                db.ref(`goals/${currentUser}`).remove();
            } else {
                finalGoal = userGoalData.text;
            }
        }
        document.getElementById('targetGoal').innerText = finalGoal || "새로운 목표를 설정하세요!";
        document.getElementById('goalSubmitBtn').innerText = finalGoal ? "설정 완료" : "목표 설정";
    }

    function saveGoal() {
        const now = new Date().getTime();
        if (now - lastClickTime < 500) {
            if (confirm("목표를 초기화하시겠습니까?")) {
                db.ref(`goals/${currentUser}`).remove();
                return;
            }
        }
        lastClickTime = now;
        const myGoal = document.getElementById('goalInput').value.trim();
        if (!myGoal) return;
        db.ref(`goals/${currentUser}`).set({ text: myGoal, timestamp: new Date().getTime() });
        document.getElementById('goalInput').value = "";
    }

    function showStreakToast() {
        const myLogs = logs.filter(l => l.user === currentUser);
        const streak = [...new Set(myLogs.map(l => l.date))].length;
        if(streak === 0) return;
        document.getElementById('streakModalText').innerHTML = `<b>${currentUser}</b>님, 벌써 <b>${streak}회</b>째 기록 중!🔥`;
        const toast = document.getElementById('streakOverlay');
        toast.style.display = 'flex';
        setTimeout(() => toast.classList.add('show'), 100);
        setTimeout(() => closeStreakModal(), 4000);
    }

    function closeStreakModal() {
        const toast = document.getElementById('streakOverlay');
        if(toast && toast.classList.contains('show')) {
            toast.classList.remove('show');
            setTimeout(() => toast.style.display = 'none', 500);
        }
    }

    function setAutoDate() {
        const now = new Date(); const days = ['일', '월', '화', '수', '목', '금', '토'];
        document.getElementById('inDate').value = `${now.getMonth() + 1}/${now.getDate()}(${days[now.getDay()]})`;
    }

    function switchTab(t, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(t + 'Page').classList.add('active');
        el.classList.add('active');
        const cheerEl = document.getElementById('cheerFloating');
        if(t === 'personal') {
            refreshPersonalPage();
            if(cheerEl) cheerEl.style.display = 'block';
        } else {
            if(cheerEl) cheerEl.style.display = 'none';
        }
        if(t === 'report') renderChart();
    }

    function handleFileChange() {
        const file = document.getElementById('imgFile').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => { selectedImg = e.target.result; document.getElementById('fileLabel').innerText = "✅ 사진 선택됨"; };
            reader.readAsDataURL(file);
        }
    }

    function handlePostSubmit() {
        const content = document.getElementById('postInput').value.trim();
        if (!content && !selectedImg) return;
        const newPostRef = db.ref('posts').push();
        newPostRef.set({
            id: Date.now(),
            user: currentUser,
            content,
            img: selectedImg,
            likes: 0,
            time: new Date().toLocaleString()
        });
        document.getElementById('postInput').value = ""; selectedImg = null; 
        document.getElementById('fileLabel').innerText = "📷 사진 첨부하기 (클릭)";
    }

    function renderFeed() {
        document.getElementById('feedList').innerHTML = posts.map(p => `
            <div class="feed-item">
                <div class="feed-header"><span>👤 ${p.user}</span><span>${p.time}</span></div>
                ${p.img ? `<img src="${p.img}" class="feed-img">` : ''}
                <div class="feed-content">${p.content}</div>
                <div class="feed-footer">
                    <button style="background:none; border:none; color:var(--point-light); cursor:pointer;" onclick="toggleLike('${p.key}')">❤️ ${p.likes || 0}</button>
                    ${p.user === currentUser ? `<button style="background:none; border:none; color:var(--point-light); cursor:pointer; font-size:0.7rem;" onclick="deletePost('${p.key}')">삭제</button>` : ''}
                </div>
            </div>`).join('');
    }

    function toggleLike(key) {
        const postRef = db.ref(`posts/${key}/likes`);
        postRef.transaction(currentLikes => (currentLikes || 0) + 1);
    }

    function deletePost(key) {
        if(confirm("기록을 삭제하시겠습니까?")) {
            db.ref('posts').child(key).remove()
                .then(() => console.log("삭제 성공"))
                .catch(err => alert("삭제 실패"));
        }
    }

    function addPersonalLog() {
        const ex = document.getElementById('inEx').value;
        const food = document.getElementById('inFood').value;
        if(!ex && !food) return;
        db.ref('logs').push({
            id: Date.now(),
            user: currentUser,
            date: document.getElementById('inDate').value,
            ex,
            food,
            weight: document.getElementById('inWeight').value
        });
        document.getElementById('inEx').value=""; document.getElementById('inFood').value=""; document.getElementById('inWeight').value="";
    }

    function refreshPersonalPage() {
        const myLogs = logs.filter(l => l.user === currentUser);
        document.getElementById('personalLogList').innerHTML = myLogs.map(l => `
            <div class="history-row">
                <span>${l.date}</span><span style="color:var(--point-light)">${l.ex}</span><span>${l.food}</span><span>${l.weight}</span>
                <span style="cursor:pointer; color:#445D56;" onclick="deleteLog('${l.key}')">×</span>
            </div>`).reverse().join('');
    }

    function deleteLog(key) {
        if(confirm("삭제하시겠습니까?")) {
            db.ref('logs').child(key).remove();
        }
    }

    function renderChart() {
        const dayMap = { '월':0, '화':1, '수':2, '목':3, '금':4, '토':5, '일':6 };
        const getPoints = (name) => {
            let activity = [0,0,0,0,0,0,0];
            logs.filter(l => l.user === name).forEach(l => { for(let day in dayMap) if(l.date.includes(day)) activity[dayMap[day]] += 20; });
            return activity.map((v, i) => `${i * 50},${100 - Math.min(v, 90)}`).join(' ');
        };
        document.getElementById('lineSo').setAttribute('points', getPoints('소이진'));
        document.getElementById('lineKim').setAttribute('points', getPoints('김진영'));
        document.getElementById('soTotal').innerText = logs.filter(l => l.user === '소이진').length + "회";
        document.getElementById('kimTotal').innerText = logs.filter(l => l.user === '김진영').length + "회";
        const myCount = logs.filter(l => l.user === currentUser).length;
        const pct = Math.min(100, myCount * 10);
        document.getElementById('pctValue').innerText = pct + "%";
        document.getElementById('progressFill').style.width = pct + "%";
    }

    document.getElementById('pwInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkLogin(); });
</script>
</body>
</html>
