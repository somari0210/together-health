<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Together Health - Sharp Pixel Edition</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="app-icon-512.png">
    <meta name="theme-color" content="#1A1D1D">
    
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-dark: #121414;      
            --point-deep: #1A1D1D;   
            --point-mid: #333838;    
            --point-light: #45D1E8;  
            --text-main: #EAEFEF;    
            
            --color-so: #FFEE58;    
            --color-kim: #45D1E8;   
            
            --pixel-orange: #FF8C5A; 
            --pixel-pink: #E84A7A;   
        }
        
        body { background-color: #222; margin: 0; display: flex; justify-content: center; font-family: 'Pretendard', sans-serif; color: var(--text-main); overflow: hidden; }
        
        .phone-container { 
            width: 100vw; 
            max-width: 450px; 
            height: 100dvh; 
            background-color: var(--bg-dark); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative; 
            border-left: 1px solid var(--point-mid);
            border-right: 1px solid var(--point-mid);
        }

        .vital-loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 5000; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .pixel-heart { font-size: 3rem; margin-bottom: 20px; animation: heartBeat 0.8s infinite; }
        @keyframes heartBeat { 0% { transform: scale(1); opacity: 0.8; } 15% { transform: scale(1.2); opacity: 1; } 30% { transform: scale(1); opacity: 0.8; } 45% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }
        .ecg-container { width: 200px; height: 40px; position: relative; overflow: hidden; border-bottom: 2px solid var(--point-mid); }
        .ecg-line { position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, var(--point-light), transparent); clip-path: polygon(0% 50%, 40% 50%, 45% 10%, 50% 90%, 55% 50%, 100% 50%, 100% 55%, 55% 55%, 50% 95%, 45% 5%, 40% 55%, 0% 55%); animation: ecgScroll 1.5s infinite linear; }
        @keyframes ecgScroll { 0% { left: -100%; } 100% { left: 100%; } }
        .loading-text { margin-top: 20px; font-size: 0.7rem; color: var(--point-light); letter-spacing: 3px; font-family: monospace; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .header { background-color: var(--point-deep); padding: 20px 15px 15px 15px; color: var(--pixel-orange); text-align: center; font-weight: bold; border-bottom: 1px solid var(--point-mid); font-size: 1.1rem; z-index: 100; flex-shrink: 0; border-radius: 0; text-transform: uppercase; letter-spacing: 1px; }

        @keyframes scanline { 0% { transform: translateY(0); } 100% { transform: translateY(100dvh); } }
        @keyframes glitch { 0% { text-shadow: 2px 0 var(--pixel-pink), -2px 0 var(--point-light); } 50% { text-shadow: -2px 0 var(--pixel-pink), 2px 0 var(--point-light); } 100% { text-shadow: 2px 0 var(--pixel-pink), -2px 0 var(--point-light); } }

        .login-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #080a0a; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; overflow: hidden; }
        .login-overlay::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(255, 255, 255, 0.03); opacity: 0.5; animation: scanline 6s linear infinite; pointer-events: none; }
        .login-box { width: 85%; padding: 40px 20px; text-align: center; position: relative; }
        .login-title { font-size: 1.8rem; font-weight: 900; color: #FFF; margin-bottom: 5px; animation: glitch 0.3s infinite; letter-spacing: -1px; text-transform: uppercase; }
        .login-input { width: 80%; padding: 15px; margin-bottom: 15px; background: #000; border: 1px solid var(--point-mid); color: var(--point-light); border-radius: 0 !important; text-align: center; font-size: 1.2rem; outline: none; }

        .modal-overlay { display: none; position: absolute; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; z-index: 3000; transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); justify-content: center; }
        .modal-overlay.show { display: flex; top: 20px; }
        .streak-modal { background: rgba(26, 29, 29, 0.9); backdrop-filter: blur(10px); width: 100%; padding: 15px; border-radius: 0 !important; border: 1px solid var(--pixel-pink); display: flex; align-items: center; gap: 12px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .streak-fire { font-size: 2rem; }
        .streak-text { flex: 1; font-size: 0.85rem; color: var(--text-main); text-align: left; }

        .page { display: none; flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 40px; scrollbar-width: none; }
        .page::-webkit-scrollbar { display: none; }
        .page.active { display: flex; flex-direction: column; }
        .section-title { color: var(--point-light); font-size: 0.9rem; font-weight: bold; border-left: 3px solid var(--point-light); padding-left: 8px; margin: 20px 0 12px 0; }
        
        .card { background: rgba(255, 255, 255, 0.03); padding: 15px; border-radius: 0 !important; margin-bottom: 20px; border: 1px solid var(--point-mid); }

        #homePage textarea, #homePage .submit-btn, #homePage .feed-item { border-radius: 0 !important; }
        textarea { width: 100%; height: 80px; background: #000; border: 1px solid var(--point-mid); color: white; padding: 12px; box-sizing: border-box; resize: none; margin-bottom: 12px; font-family: inherit; border-radius: 0; flex-shrink: 0; }
        .submit-btn { width: 100%; padding: 15px; background-color: var(--pixel-pink); border: none; font-weight: bold; cursor: pointer; color: white; border-radius: 0; flex-shrink: 0; }
        .feed-item { background: #1A1D1D; padding: 15px; margin-bottom: 15px; border: 1px solid var(--point-mid); text-align: left; border-radius: 0; }
        .feed-header { display: flex; justify-content: space-between; font-size: 0.8rem; color: #777; margin-bottom: 10px; }
        .feed-img { width: 100%; max-height: 300px; object-fit: cover; margin-bottom: 10px; border: 1px solid #000; border-radius: 0; }
        .feed-footer button { color: var(--point-light) !important; }

        .personal-card { background: #1A1D1D; padding: 15px; border-radius: 0 !important; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; border: 1px solid var(--point-mid); }
        .img-input { background: #000; border: 1px solid var(--point-mid); color: var(--text-main); padding: 12px; font-size: 0.85rem; border-radius: 0 !important; outline: none; box-sizing: border-box; width: 100%; }
        .add-btn-green { grid-column: span 2; background: var(--point-light); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 0 !important; flex-shrink: 0; }
        .history-container { background: #1A1D1D; border-radius: 0 !important; overflow: hidden; border: 1px solid var(--point-mid); }
        .history-thead, .history-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 0.5fr; padding: 12px 5px; font-size: 0.75rem; text-align: center; }
        .history-row { border-top: 1px solid var(--point-mid); font-size: 0.85rem; align-items: center; border-radius: 0; }

        .cheer-floating { position: absolute; bottom: 100px; right: 20px; background: #FFEE58; color: #000; padding: 10px 15px; border-radius: 0; font-size: 0.75rem; font-weight: bold; z-index: 99; display: none; box-shadow: 4px 4px 0px rgba(0,0,0,0.3); border: 1px solid #000; }
        .cheer-floating::after { content: ""; position: absolute; bottom: -10px; right: 0; width: 0; height: 0; border-left: 10px solid transparent; border-top: 10px solid #FFEE58; }

        .chart-container { height: 100px; background: #000; border-radius: 0 !important; padding: 10px; position: relative; border: 1px solid var(--point-mid); }
        svg { width: 100%; height: 100%; overflow: visible; }
        polyline { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
        .progress-container { width: 100%; height: 12px; background: #000; border-radius: 0 !important; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--pixel-pink), var(--point-light)); width: 0%; transition: width 1s ease; border-radius: 0; }

        .nav { background-color: var(--point-deep); display: flex; justify-content: space-around; padding: 12px 0 25px 0; position: relative; bottom: 0; width: 100%; border-top: 1px solid var(--point-mid); z-index: 100; flex-shrink: 0; border-radius: 0; text-transform: uppercase; }
        .nav-item { cursor: pointer; color: white; opacity: 0.4; text-align: center; font-size: 0.7rem; }
        .nav-item.active { opacity: 1; color: var(--pixel-orange); }
    </style>
</head>
<body>

<div class="phone-container">
    <div id="vitalLoader" class="vital-loader">
        <div class="pixel-heart">❤️</div>
        <div class="ecg-container"><div class="ecg-line"></div></div>
        <div class="loading-text">SYSTEM VITAL CHECKING...</div>
    </div>

    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <div class="login-title">TOGETHER HEALTH</div>
            <p style="color: var(--pixel-orange); font-size: 0.7rem; margin-bottom: 30px; letter-spacing: 2px;">SECURE DATA ACCESS</p>
            <input type="password" id="pwInput" class="login-input" placeholder="PASSCODE">
            <button class="submit-btn" style="width: 80%; margin-top: 10px;" onclick="checkLogin()">로그인</button>
            <p id="loginMsg" style="color: var(--pixel-pink); font-size: 0.8rem; margin-top: 15px;"></p>
        </div>
    </div>

    <div id="streakOverlay" class="modal-overlay">
        <div class="streak-modal">
            <span class="streak-fire">🔥</span>
            <div id="streakModalText" class="streak-text"></div>
            <span class="modal-close" onclick="closeStreakModal()" style="cursor:pointer; font-weight:bold;">×</span>
        </div>
    </div>

    <div class="header" id="mainTitle">TOGETHER HEALTH</div>

    <div id="homePage" class="page active">
        <textarea id="postInput" placeholder="오늘의 식단이나 운동을 기록하세요..."></textarea>
        <button class="submit-btn" onclick="handlePostSubmit()">공유하기</button>
        <label for="imgFile" id="fileLabel" style="display:block; text-align:center; color:var(--point-light); font-size:0.8rem; cursor:pointer; margin: 15px 0; text-decoration:underline; flex-shrink: 0;">📷 사진 첨부하기 (클릭)</label>
        <input type="file" id="imgFile" style="display:none" onchange="handleFileChange()" accept="image/*">
        <div id="feedList" style="margin-top:10px;"></div>
    </div>

    <div id="reportPage" class="page">
        <div class="section-title">🎯 이번 주 목표</div>
        <div class="card">
            <input type="text" id="goalInput" placeholder="새 목표 입력" class="img-input">
            <button id="goalSubmitBtn" class="submit-btn" style="margin-top:10px; padding:10px;" onclick="saveGoal()">목표 설정</button>
            <p id="targetGoal" style="color:var(--color-so); font-size:0.85rem; text-align:center; margin-top:10px; font-weight:bold;"></p>
        </div>
        <div class="section-title">📊 활동 에너지 점수 (Week)</div>
        <div class="card">
            <div class="chart-container">
                <svg viewBox="0 0 300 100" preserveAspectRatio="none">
                    <polyline id="lineSo" points="" stroke="var(--color-so)"></polyline>
                    <polyline id="lineKim" points="" stroke="var(--color-kim)"></polyline>
                </svg>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                <div style="text-align:center;"><span id="soTotal" style="color:var(--color-so); font-weight:bold;">0회</span><br><small>이진</small></div>
                <div style="text-align:center;"><span id="kimTotal" style="color:var(--color-kim); font-weight:bold;">0회</span><br><small>진영</small></div>
            </div>
        </div>
        <div class="section-title">🎊 목표 달성 시뮬레이션</div>
        <div class="card">
            <div style="display:flex; justify-content:space-between; font-size:0.8rem;"><span>성공률</span><span id="pctValue">0%</span></div>
            <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
        </div>
    </div>

    <div id="personalPage" class="page">
        <div class="section-title">✍️ 오늘 기록 입력</div>
        <div class="personal-card">
            <input type="text" id="inDate" class="img-input" readonly>
            <input type="text" id="inWeight" class="img-input" placeholder="체중(kg)">
            <input type="text" id="inEx" class="img-input" placeholder="운동(🏃)">
            <input type="text" id="inFood" class="img-input" placeholder="식단(🥗)">
            <button class="add-btn-green" onclick="addPersonalLog()">기록 추가</button>
        </div>
        <div class="history-container">
            <div class="history-thead"><span>날짜</span><span>운동</span><span>식단</span><span>체중</span><span>×</span></div>
            <div id="personalLogList"></div>
        </div>
        <div id="cheerFloating" class="cheer-floating"></div>
    </div>

    <div class="nav">
        <div class="nav-item" onclick="switchTab('report', this)">📊<br>REPORT</div>
        <div class="nav-item active" onclick="switchTab('home', this)">🏠<br>HOME</div>
        <div class="nav-item" onclick="switchTab('personal', this)">👤<br>USER</div>
    </div>
</div>

<script>
    // --- Firebase 설정 ---
    const firebaseConfig = {
        apiKey: "AIzaSyDLT42wAbGadooJtENlS2rArMemdaBYBNM",
        authDomain: "together-health.firebaseapp.com",
        databaseURL: "https://together-health-default-rtdb.firebaseio.com",
        projectId: "together-health",
        storageBucket: "together-health.firebasestorage.app",
        messagingSenderId: "77888571104",
        appId: "1:77888571104:web:7f254f1ce59c94bdedf285",
        measurementId: "G-K18GSMT0VD"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 앱 상태 변수 ---
    let currentUser = null;
    const passwords = { "소이진": "3512", "김진영": "2945" };
    let posts = [];
    let logs = [];
    let selectedImg = null;
    let lastClickTime = 0;
    let isFirstLogin = true;

    window.onload = () => { 
        setAutoDate(); 
        setTimeout(() => {
            const loader = document.getElementById('vitalLoader');
            loader.style.transition = 'opacity 0.5s';
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                document.getElementById('loginOverlay').style.display = 'flex'; 
            }, 500);
        }, 2500);
    };

    function checkLogin() {
        const inputPw = document.getElementById('pwInput').value;
        for (const [user, pw] of Object.entries(passwords)) {
            if (pw === inputPw) {
                currentUser = user;
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainTitle').innerText = `TOGETHER HEALTH (${currentUser})`;
                initRealtimeListeners(); // 로그인 성공 시 실시간 DB 연결
                return;
            }
        }
        document.getElementById('loginMsg').innerText = "ERROR: INVALID_PASSCODE";
    }

    // --- Firebase 실시간 동기화 리스너 ---
    function initRealtimeListeners() {
        // 1. 피드(게시글) 동기화
        db.ref('posts').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            posts = Object.values(data).sort((a, b) => b.id - a.id); // 최신순 정렬
            renderFeed();
        });

        // 2. 개인 기록 동기화
        db.ref('logs').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            logs = Object.values(data).sort((a, b) => a.id - b.id); // 오래된순 정렬(UI에서 역순출력)
            refreshPersonalPage();
            renderChart();
            
            // 로그인 직후 최초 1회만 스트릭 알림 및 응원 메시지 표시
            if(isFirstLogin) {
                showStreakToast();
                setDailyCheer();
                isFirstLogin = false;
            }
        });

        // 3. 목표 동기화
        db.ref('goals').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            updateGoalUI(data);
        });
    }

    // --- 목표 관리 로직 (Firebase 버전) ---
    function updateGoalUI(allGoalsData) {
        const myData = allGoalsData[currentUser];
        if (myData) {
            const now = new Date();
            const saveDay = new Date(myData.date);
            const monday = new Date(now);
            const day = now.getDay();
            const diff = now.getDate() - day + (day === 0 ? -6 : 1);
            monday.setDate(diff);
            monday.setHours(0, 0, 0, 0);
            
            // 월요일이 지났으면 기존 목표 초기화
            if (saveDay < monday) {
                db.ref('goals/' + currentUser).remove();
            } else {
                document.getElementById('targetGoal').innerText = myData.goal;
                document.getElementById('goalSubmitBtn').innerText = "설정 완료";
                return;
            }
        }
        document.getElementById('targetGoal').innerText = "새로운 목표를 설정하세요!";
        document.getElementById('goalSubmitBtn').innerText = "목표 설정";
    }

    function saveGoal() {
        const now = new Date().getTime();
        if (now - lastClickTime < 500) {
            if (confirm("목표를 초기화하시겠습니까?")) {
                db.ref('goals/' + currentUser).remove();
                return;
            }
        }
        lastClickTime = now;
        const myGoal = document.getElementById('goalInput').value.trim();
        if (!myGoal) return;
        
        db.ref('goals/' + currentUser).set({ goal: myGoal, date: new Date().getTime() });
        document.getElementById('goalInput').value = "";
    }

    // --- 이미지 자동 압축 로직 (DB 과부하 방지) ---
    function handleFileChange() {
        const file = document.getElementById('imgFile').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; // 최대 가로 픽셀 제한
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // 화질을 약간 낮춰서 용량 극적 감소 (JPEG 포맷 변환)
                    selectedImg = canvas.toDataURL('image/jpeg', 0.7); 
                    document.getElementById('fileLabel').innerText = "✅ 사진 첨부 완료 (클릭 시 변경)";
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    }

    // --- 게시글 로직 (Firebase 버전) ---
    function handlePostSubmit() {
        const content = document.getElementById('postInput').value.trim();
        if (!content && !selectedImg) return;
        
        const postData = { id: Date.now(), user: currentUser, content: content, img: selectedImg, likes: 0, time: new Date().toLocaleString() };
        db.ref('posts/' + postData.id).set(postData); // DB에 저장 (동기화는 리스너가 자동 처리)
        
        document.getElementById('postInput').value = ""; selectedImg = null; 
        document.getElementById('fileLabel').innerText = "📷 사진 첨부하기 (클릭)";
    }

    function toggleLike(id) {
        db.ref('posts/' + id + '/likes').transaction((currentLikes) => {
            return (currentLikes || 0) + 1;
        });
    }

    function deletePost(id) {
        if(confirm("기록을 삭제하시겠습니까?")) { 
            db.ref('posts/' + id).remove(); 
        }
    }

    function renderFeed() {
        document.getElementById('feedList').innerHTML = posts.map(p => `
            <div class="feed-item">
                <div class="feed-header"><span>👤 ${p.user}</span><span>${p.time}</span></div>
                ${p.img ? `<img src="${p.img}" class="feed-img">` : ''}
                <div class="feed-content">${p.content}</div>
                <div class="feed-footer">
                    <button style="background:none; border:none; color:var(--point-light); cursor:pointer;" onclick="toggleLike(${p.id})">❤️ ${p.likes || 0}</button>
                    ${p.user === currentUser ? `<button style="background:none; border:none; color:var(--point-light); cursor:pointer; font-size:0.7rem;" onclick="deletePost(${p.id})">삭제</button>` : ''}
                </div>
            </div>`).join('');
    }

    // --- 개인 기록 로직 (Firebase 버전) ---
    function addPersonalLog() {
        const ex = document.getElementById('inEx').value;
        const food = document.getElementById('inFood').value;
        if(!ex && !food) return;
        
        const logData = { id: Date.now(), user: currentUser, date: document.getElementById('inDate').value, ex: ex, food: food, weight: document.getElementById('inWeight').value };
        db.ref('logs/' + logData.id).set(logData);
        
        document.getElementById('inEx').value=""; document.getElementById('inFood').value=""; document.getElementById('inWeight').value="";
    }

    function deleteLog(id) {
        if(confirm("삭제하시겠습니까?")) { 
            db.ref('logs/' + id).remove(); 
        }
    }

    function refreshPersonalPage() {
        const myLogs = logs.filter(l => l.user === currentUser);
        document.getElementById('personalLogList').innerHTML = myLogs.map(l => `
            <div class="history-row">
                <span>${l.date}</span><span style="color:var(--color-so)">${l.ex}</span><span>${l.food}</span><span>${l.weight}</span>
                <span style="cursor:pointer; color:rgba(255,255,255,0.2);" onclick="deleteLog(${l.id})">×</span>
            </div>`).reverse().join('');
    }

    // --- 부가 기능 로직 유지 ---
    function setDailyCheer() { const msgs = ["오늘도 고생했어! 💛", "물 한잔 마셨어? 💧", "화이팅, 할 수 있어! 🔥", "기록하는 당신이 아름다워요✨", "천천히 가도 괜찮아🐢"]; const now = new Date(); const dateNum = (now.getFullYear() * 10000) + ((now.getMonth() + 1) * 100) + now.getDate(); const dailyIndex = dateNum % msgs.length; const cheerEl = document.getElementById('cheerFloating'); if(cheerEl) { cheerEl.innerText = msgs[dailyIndex]; cheerEl.style.display = 'block'; } }
    function showStreakToast() { const myLogs = logs.filter(l => l.user === currentUser); const streak = [...new Set(myLogs.map(l => l.date))].length; document.getElementById('streakModalText').innerHTML = `<b>${currentUser}</b>님, 벌써 <b>${streak}회</b>째 기록 중!🔥`; const toast = document.getElementById('streakOverlay'); toast.style.display = 'flex'; setTimeout(() => toast.classList.add('show'), 100); setTimeout(() => closeStreakModal(), 4000); }
    function closeStreakModal() { const toast = document.getElementById('streakOverlay'); toast.classList.remove('show'); setTimeout(() => toast.style.display = 'none', 500); }
    function setAutoDate() { const now = new Date(); const days = ['일', '월', '화', '수', '목', '금', '토']; document.getElementById('inDate').value = `${now.getMonth() + 1}/${now.getDate()}(${days[now.getDay()]})`; }
    
    function switchTab(t, el) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); 
        document.getElementById(t + 'Page').classList.add('active'); el.classList.add('active'); 
        const cheerEl = document.getElementById('cheerFloating'); 
        if(t === 'personal') { if(cheerEl) cheerEl.style.display = 'block'; } 
        else { if(cheerEl) cheerEl.style.display = 'none'; } 
    }

    function renderChart() {
        const dayMap = { '월':0, '화':1, '수':2, '목':3, '금':4, '토':5, '일':6 };
        const getPoints = (name) => {
            let activity = [0,0,0,0,0,0,0];
            logs.filter(l => l.user === name).forEach(l => { for(let day in dayMap) if(l.date.includes(day)) activity[dayMap[day]] += 20; });
            return activity.map((v, i) => `${i * (300/6)},${100 - Math.min(v, 90)}`).join(' ');
        };
        document.getElementById('lineSo').setAttribute('points', getPoints('소이진'));
        document.getElementById('lineKim').setAttribute('points', getPoints('김진영'));
        document.getElementById('soTotal').innerText = logs.filter(l => l.user === '소이진').length + "회";
        document.getElementById('kimTotal').innerText = logs.filter(l => l.user === '김진영').length + "회";
        const myCount = logs.filter(l => l.user === currentUser).length;
        const pct = Math.min(100, myCount * 10);
        document.getElementById('pctValue').innerText = pct + "%";
        document.getElementById('progressFill').style.width = pct + "%";
    }

    document.getElementById('pwInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkLogin(); });
</script>
